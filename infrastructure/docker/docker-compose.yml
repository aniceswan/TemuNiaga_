version: "3.9"

# Documented target dev/CI environment for TemuNiaga. NOT runnable on the
# machine this scaffold was built on — Docker is not installed there.
# See infrastructure/docker/README.md for the local, non-Docker alternative
# actually used to build and seed this scaffold.

services:
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: temuniaga
      POSTGRES_PASSWORD: temuniaga
      POSTGRES_DB: temuniaga_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: temuniaga
      MINIO_ROOT_PASSWORD: temuniaga-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  redis_data:
  minio_data:
